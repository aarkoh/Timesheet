<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1.25rem 1rem}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;border-bottom:1px solid #e0ddd6;padding-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;flex:1}
.back{font-size:12px;color:#185FA5;text-decoration:none;padding:5px 10px;border:1px solid #B5D4F4;border-radius:8px;background:#E6F1FB;white-space:nowrap}
.conn{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.conn.online{background:#EAF3DE;color:#3B6D11}.conn.offline{background:#FCEBEB;color:#A32D2D}.conn.syncing{background:#FAEEDA;color:#854F0B}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.controls input[type=text]{flex:1;min-width:160px;padding:7px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
select{font-family:inherit;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer}
button.view-btn{font-family:inherit;font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555}
button.view-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
/* Week strip */
.week-header{display:flex;align-items:center;gap:8px;margin:1.2rem 0 0.5rem}
.week-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
.week-line{flex:1;height:1px;background:#e0ddd6}
.week-today{font-size:11px;background:#FAEEDA;color:#854F0B;border-radius:10px;padding:2px 8px;font-weight:600}
/* Job cards */
.job-card{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1rem;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;transition:box-shadow .12s;cursor:default}
.job-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.job-card.past{opacity:.6}
.job-date-col{text-align:center;min-width:50px}
.job-day{font-size:22px;font-weight:700;line-height:1;color:#1a1a1a}
.job-mon{font-size:11px;color:#888;text-transform:uppercase}
.job-dow{font-size:10px;color:#aaa;margin-top:2px}
.job-main{min-width:0}
.job-ref{font-size:13px;font-weight:700;color:#185FA5;margin-bottom:2px}
.job-customer{font-size:12px;color:#555;margin-bottom:4px}
.job-vessel{font-size:13px;font-weight:600;margin-bottom:2px}
.job-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.tag-task{background:#f4f8fe;color:#185FA5;border:1px solid #B5D4F4}
.tag-port{background:#f5f5f3;color:#666;border:1px solid #e0ddd6}
.tag-eng{background:#F3E6F3;color:#8B1A8B;border:1px solid #d4b8d4}
.tag-equip{background:#f5f5f3;color:#444;border:1px solid #e0ddd6}
.status-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;display:inline-block}
.st-quote{background:#f5f5f3;color:#888;border:1px solid #ddd}
.st-customer_po{background:#EAF3DE;color:#3B6D11;border:1px solid #b8e4c5}
.st-vendor_po{background:#F3E6F3;color:#8B1A8B;border:1px solid #d4b8d4}
.st-do_wcc{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}
.st-invoice{background:#FAEEDA;color:#854F0B;border:1px solid #f0c08a}
.st-soa{background:#FCEBEB;color:#A32D2D;border:1px solid #f5b8b8}
.st-closed{background:#1a1a1a;color:#fff;border:1px solid #1a1a1a}
.job-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:90px}
/* Workers */
.workers-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.worker-chip{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:#EAF3DE;color:#3B6D11;border:1px solid #b8e4c5}
.worker-chip.out{background:#FCEBEB;color:#A32D2D;border:1px solid #f5b8b8}
.worker-chip.planned{background:#f5f5f3;color:#888;border:1px dashed #ccc}
/* List view */
.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0ddd6;font-size:13px}
.list-table th{font-size:11px;font-weight:600;color:#888;padding:10px 12px;border-bottom:1px solid #e0ddd6;text-align:left;background:#f9f9f7}
.list-table td{padding:9px 12px;border-bottom:1px solid #f0ede6;vertical-align:top}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:#f9f9f7}
/* Empty */
.empty{font-size:13px;color:#aaa;text-align:center;padding:3rem;border:1px solid #e0ddd6;border-radius:12px;background:#fff}
/* Loading */
.loading-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
.loading-screen.hide{display:none}
.spinner{width:28px;height:28px;border:3px solid #e0ddd6;border-top-color:#185FA5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:13px;color:#888}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:9px 20px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.eta-soon{color:#854F0B;font-weight:600}
.eta-overdue{color:#A32D2D;font-weight:600}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><p>Loading planner…</p></div>
<div class="app">
  <div class="topbar">
    <h1>&#128197; Job Planner</h1>
    <a href="https://aarkoh.github.io/Raycontrol/" class="back">&#8962; Hub</a>
    <span class="conn syncing" id="connBadge">Connecting…</span>
  </div>
  <div class="controls">
    <input type="text" id="searchInp" placeholder="Search ref, vessel, customer…" oninput="render()">
    <select id="statusFilter" onchange="render()">
      <option value="">All active</option>
      <option value="quote">Quote</option>
      <option value="customer_po">Customer PO</option>
      <option value="vendor_po">Vendor PO</option>
      <option value="do_wcc">DO / WCC</option>
      <option value="invoice">Invoice Sent</option>
      <option value="all">All incl. closed</option>
    </select>
    <select id="workerFilter" onchange="render()">
      <option value="">All workers</option>
    </select>
    <select id="rangeFilter" onchange="render()">
      <option value="upcoming">Upcoming (90 days)</option>
      <option value="week">This week</option>
      <option value="month">This month</option>
      <option value="all">All dates</option>
    </select>
    <button class="view-btn active" id="btnCard" onclick="setView('card',this)">&#9646; Cards</button>
    <button class="view-btn" id="btnList" onclick="setView('list',this)">&#9776; List</button>
  </div>
  <div id="plannerContent"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,onValue}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import{getAuth,signInAnonymously,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app=initializeApp({apiKey:"AIzaSyBOTxO07JoBnygdNhrZsCCnY33mUlm9oo4",authDomain:"attendance-20d6a.firebaseapp.com",databaseURL:"https://attendance-20d6a-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"attendance-20d6a",storageBucket:"attendance-20d6a.firebasestorage.app",messagingSenderId:"597668949951",appId:"1:597668949951:web:f7fcc8c3b4450f8f80bb0a"});
const db=getDatabase(app);
const auth=getAuth(app);

const SL={quote:'Quote',customer_po:'Customer PO',vendor_po:'Vendor PO',do_wcc:'DO / WCC',invoice:'Invoice Sent',soa:'SOA Sent',closed:'Closed'};
let jobs={}, logByJob={}, workers=[], viewMode='card';

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function setView(v,el){
  viewMode=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
window.setView=setView;

function fmtDate(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'});
}
function getDateObj(d){return d?new Date(d+'T00:00:00'):null;}
function daysDiff(d){
  if(!d)return null;
  const now=new Date();now.setHours(0,0,0,0);
  return Math.round((getDateObj(d)-now)/(1000*60*60*24));
}

function etaLabel(eta){
  if(!eta)return'';
  const d=daysDiff(eta);
  if(d===null)return'';
  if(d<0)return`<span class="eta-overdue">${Math.abs(d)}d overdue</span>`;
  if(d===0)return`<span class="eta-soon">Today</span>`;
  if(d<=7)return`<span class="eta-soon">In ${d}d</span>`;
  return`<span style="color:#888;font-size:11px">In ${d}d</span>`;
}

function getJobDate(j){return j.eta||j.date||'';}

function getWorkers(jref){
  // Workers who have logged against this job ref
  return logByJob[jref]||{};
}

function workerChips(jref,engineerName){
  const wmap=getWorkers(jref);
  const chips=[];
  // Engineer from job record
  if(engineerName){
    const eng=engineerName.split(',').map(s=>s.trim()).filter(Boolean);
    eng.forEach(e=>{
      if(!wmap[e])chips.push(`<span class="worker-chip planned" title="Assigned engineer">${e}</span>`);
    });
  }
  // Clock-in workers
  Object.entries(wmap).forEach(([w,status])=>{
    const cls=status==='in'?'worker-chip':'worker-chip out';
    const lbl=status==='in'?'Clocked in':'Clocked out';
    chips.push(`<span class="${cls}" title="${lbl}">${w}</span>`);
  });
  return chips.length?`<div class="workers-row">${chips.join('')}</div>`:'';
}

function filterJobs(){
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  const wf=document.getElementById('workerFilter').value;
  const rf=document.getElementById('rangeFilter').value;
  const now=new Date();now.setHours(0,0,0,0);
  const today=now.toISOString().slice(0,10);

  return Object.entries(jobs).filter(([id,j])=>{
    if(j.archived)return false;
    // Status filter
    if(sf==='all'){}
    else if(sf){if(j.status!==sf)return false;}
    else{if(['closed','soa'].includes(j.status||''))return false;}
    // Search
    const jd=getJobDate(j);
    if(q&&![j.ref,j.customerName,j.vessel,j.equip,j.task,j.port].filter(Boolean).some(x=>x.toLowerCase().includes(q)))return false;
    // Worker filter
    if(wf){
      const wmap=getWorkers(j.ref||'');
      const engMatch=(j.engineer||'').split(',').some(e=>e.trim()===wf);
      if(!wmap[wf]&&!engMatch)return false;
    }
    // Date range
    if(rf==='week'){
      const end=new Date(now);end.setDate(end.getDate()+7);
      const jdt=getDateObj(jd);
      if(!jdt||jdt>end)return false;
    } else if(rf==='month'){
      const end=new Date(now);end.setDate(end.getDate()+30);
      const jdt=getDateObj(jd);
      if(!jdt||jdt>end)return false;
    } else if(rf==='upcoming'){
      const end=new Date(now);end.setDate(end.getDate()+90);
      const jdt=getDateObj(jd);
      if(!jdt||jdt>end)return false;
    }
    return true;
  }).sort((a,b)=>{
    const da=getJobDate(a[1])||'9999';
    const db2=getJobDate(b[1])||'9999';
    return da.localeCompare(db2);
  });
}

function render(){
  const list=filterJobs();
  const cont=document.getElementById('plannerContent');
  if(!list.length){cont.innerHTML='<div class="empty">No jobs match the current filters</div>';return;}

  if(viewMode==='list'){
    renderList(list,cont);
  } else {
    renderCards(list,cont);
  }
}
window.render=render;

function renderCards(list,cont){
  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=today.toISOString().slice(0,10);

  // Group by week
  const weeks={};
  list.forEach(([id,j])=>{
    const jd=getJobDate(j)||'0000-00-00';
    const dt=getDateObj(jd)||new Date(0);
    // Week key = Monday of that week
    const day=dt.getDay();
    const mon=new Date(dt);
    mon.setDate(dt.getDate()-(day===0?6:day-1));
    const wk=mon.toISOString().slice(0,10);
    if(!weeks[wk])weeks[wk]=[];
    weeks[wk].push([id,j]);
  });

  let html='';
  Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([wk,items])=>{
    const wkDt=new Date(wk+'T00:00:00');
    const wkEnd=new Date(wkDt);wkEnd.setDate(wkDt.getDate()+6);
    const wkLabel=wkDt.toLocaleDateString('en-SG',{day:'2-digit',month:'short'})+' – '+wkEnd.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'});
    const isThisWeek=wk<=todayStr&&todayStr<=wkEnd.toISOString().slice(0,10);
    html+=`<div class="week-header"><span class="week-label">${wkLabel}</span>${isThisWeek?'<span class="week-today">This week</span>':''}<span class="week-line"></span></div>`;
    items.forEach(([id,j])=>{
      const jd=getJobDate(j);
      const dt=jd?new Date(jd+'T00:00:00'):null;
      const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dayNum=dt?dt.getDate():'—';
      const mon=dt?MONTHS[dt.getMonth()]:'';
      const dow=dt?DAYS[dt.getDay()]:'';
      const st=j.status||'quote';
      const isPast=jd&&jd<todayStr;
      const chips=workerChips(j.ref||'',j.engineer||'');
      html+=`<div class="job-card${isPast?' past':''}">
        <div class="job-date-col">
          <div class="job-day">${dayNum}</div>
          <div class="job-mon">${mon}</div>
          <div class="job-dow">${dow}</div>
        </div>
        <div class="job-main">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
            <span class="job-ref">${j.ref||'—'}</span>
            <span class="status-badge st-${st}">${SL[st]||st}</span>
            ${etaLabel(j.eta)}
          </div>
          <div class="job-customer">${j.customerName||''}</div>
          <div class="job-vessel">${j.vessel?'⚓ '+j.vessel:''}</div>
          <div class="job-tags">
            ${j.task?`<span class="tag tag-task">${j.task}</span>`:''}
            ${j.port?`<span class="tag tag-port">📍 ${j.port}</span>`:''}
            ${j.equip?`<span class="tag tag-equip">${j.equip}${j.make?' · '+j.make:''}${j.model?' '+j.model:''}</span>`:''}
          </div>
          ${chips}
        </div>
        <div class="job-right">
          <div style="font-size:11px;color:#aaa;text-align:right">${jd?'ETA<br>'+fmtDate(jd):''}</div>
        </div>
      </div>`;
    });
  });
  cont.innerHTML=html;
}

function renderList(list,cont){
  let rows=list.map(([id,j])=>{
    const jd=getJobDate(j);
    const st=j.status||'quote';
    const wmap=getWorkers(j.ref||'');
    const engList=(j.engineer||'').split(',').map(s=>s.trim()).filter(Boolean);
    const allW=[...new Set([...engList,...Object.keys(wmap)])];
    const chips=allW.map(w=>`<span class="worker-chip${wmap[w]==='out'?' out':!wmap[w]?' planned':''}">${w}</span>`).join('');
    return`<tr>
      <td style="font-weight:600;color:#185FA5;white-space:nowrap">${j.ref||'—'}</td>
      <td>${j.customerName||''}</td>
      <td>${j.vessel?'⚓ '+j.vessel:''}</td>
      <td>${j.task||''}</td>
      <td>${j.port||''}</td>
      <td style="white-space:nowrap">${jd?fmtDate(jd):''}${etaLabel(j.eta)?'<br>'+etaLabel(j.eta):''}</td>
      <td><span class="status-badge st-${st}">${SL[st]||st}</span></td>
      <td><div class="workers-row">${chips}</div></td>
    </tr>`;
  }).join('');
  cont.innerHTML=`<table class="list-table">
    <thead><tr><th>Ref</th><th>Customer</th><th>Vessel</th><th>Task</th><th>Port</th><th>ETA / Date</th><th>Status</th><th>Workers</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function updateWorkerFilter(){
  const sel=document.getElementById('workerFilter');
  const cur=sel.value;
  sel.innerHTML='<option value="">All workers</option>'+workers.map(w=>`<option value="${w}"${w===cur?' selected':''}>${w}</option>`).join('');
}

signInAnonymously(auth).catch(e=>console.error(e));
onAuthStateChanged(auth,user=>{
  if(!user)return;
  const b=document.getElementById('connBadge');

  onValue(ref(db,'.info/connected'),snap=>{
    b.textContent=snap.val()?'Live':'Offline';
    b.className='conn '+(snap.val()?'online':'offline');
  });

  onValue(ref(db,'config/workers'),snap=>{
    if(snap.exists()&&Array.isArray(snap.val()))workers=snap.val();
    updateWorkerFilter();
  });

  onValue(ref(db,'jobs'),snap=>{
    jobs=snap.val()||{};
    document.getElementById('loadingScreen').classList.add('hide');
    render();
  });

  // Build logByJob: {jobRef: {workerName: 'in'|'out'}}
  // Use REST fetch (more reliable for large log node)
  async function fetchLog(){
    try{
      const token=user?await user.getIdToken():'';
      const url='https://attendance-20d6a-default-rtdb.asia-southeast1.firebasedatabase.app/log.json'+(token?'?auth='+token:'');
      const res=await fetch(url);
      const data=await res.json();
      if(!data)return;
      // Reset
      logByJob={};
      // Process entries — for each worker+job, track latest status
      const latest={}; // key: worker+job → {time, type}
      Object.values(data).forEach(e=>{
        if(!e.job||!e.worker)return;
        const k=e.worker+'|'+e.job;
        if(!latest[k]||e.time>latest[k].time){
          latest[k]={time:e.time,type:e.type,worker:e.worker,job:e.job};
        }
      });
      Object.values(latest).forEach(e=>{
        if(!logByJob[e.job])logByJob[e.job]={};
        logByJob[e.job][e.worker]=e.type; // 'in' or 'out'
      });
      render();
    }catch(err){console.error('fetchLog:',err);}
  }
  fetchLog();
  setInterval(fetchLog,30000);
});

setTimeout(()=>document.getElementById('loadingScreen').classList.add('hide'),6000);
</script>
</body>
</html>
