*{box-sizing:border-box;margin:0;padding:0}

.conn{font-size:12px;margin-top:8px}

signInAnonymously(auth).catch(e=>{
  document.getElementById('connStatus').textContent='Connection failed: '+e.message;
  document.getElementById('connStatus').style.color='#A32D2D';
});
onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById('connStatus').textContent='✓ Connected — ready to import';
    document.getElementById('connStatus').style.color='#3B6D11';
    document.getElementById('btn').disabled=false;
  }
});

window.runImport=async function(){
  const btn=document.getElementById('btn');
  const progBox=document.getElementById('progBox');
  const progText=document.getElementById('progText');
  const barFill=document.getElementById('barFill');
  const doneBox=document.getElementById('doneBox');
  const errBox=document.getElementById('errBox');
  btn.disabled=true; btn.textContent='Importing…';
  progBox.style.display='block'; errBox.style.display='none';
  let done=0, errors=[];
  for(let i=0;i<ITEMS.length;i++){
    try{
      await push(ref(db,'stock/items'),ITEMS[i]);
      done++;
    }catch(e){ errors.push(ITEMS[i].name+': '+e.message); }
    const pct=Math.round(((i+1)/ITEMS.length)*100);
    barFill.style.width=pct+'%';
    progText.textContent='Importing '+done+' / '+ITEMS.length+'…';
    if(i%10===9) await new Promise(r=>setTimeout(r,300));
  }
  progBox.style.display='none';
  if(errors.length){ errBox.innerHTML='<b>'+errors.length+' errors:</b><br>'+errors.join('<br>'); errBox.style.display='block'; }
  if(done>0){
    doneBox.innerHTML='&#10003; '+done+' items imported! All units set to KG.<br><small style="font-weight:400;color:#555">You can now delete this file from GitHub.</small>';
    doneBox.style.display='block';
  }
  btn.textContent='Done';
};
</script>
