<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:1.25rem 1rem}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;border-bottom:1px solid #e0ddd6;padding-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;flex:1;color:#1a1a1a}
.liveclock{font-size:13px;color:#888;font-variant-numeric:tabular-nums}
.conn{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.conn.online{background:#EAF3DE;color:#3B6D11}
.conn.offline{background:#FCEBEB;color:#A32D2D}
.conn.syncing{background:#FAEEDA;color:#854F0B}
.worker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:420px){.worker-grid{grid-template-columns:repeat(2,1fr)}}
.wcard{border:1px solid #ddd;border-radius:12px;padding:1rem 0.5rem;cursor:pointer;background:#fff;text-align:center;transition:border-color 0.12s,background 0.12s;-webkit-tap-highlight-color:transparent;user-select:none}
.wcard:hover{border-color:#aaa;background:#fafafa}
.wcard.sel{border:2px solid #185FA5;background:#E6F1FB}
.wcard.ci{border-color:#3B6D11}
.wcard.sel.ci{border:2px solid #3B6D11;background:#EAF3DE}
.wav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;margin:0 auto 8px;background:#eee;color:#555}
.wcard.sel .wav{background:#B5D4F4;color:#185FA5}
.wcard.ci .wav{background:#C0DD97;color:#3B6D11}
.wcard.sel.ci .wav{background:#C0DD97;color:#3B6D11}
.wnum{font-size:11px;color:#aaa;margin-bottom:2px}
.wstat{font-size:11px;color:#999;margin-top:3px}
.wstat.in{color:#3B6D11;font-weight:500}
.apanel{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.apanel h2{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.apanel .sub{font-size:13px;color:#888;margin-bottom:1rem}
.brow{display:flex;gap:8px;flex-wrap:wrap}
button{font-family:inherit;font-size:13px;padding:9px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.12s,transform 0.1s;-webkit-tap-highlight-color:transparent}
button:hover{background:#f5f5f3}
button:active{transform:scale(0.97)}
button:disabled{opacity:0.35;cursor:default;transform:none}
.btn-in{border-color:#185FA5;color:#185FA5;font-weight:500}.btn-in:hover{background:#E6F1FB}
.btn-out{border-color:#A32D2D;color:#A32D2D;font-weight:500}.btn-out:hover{background:#FCEBEB}
.job-field{margin-bottom:1rem}
.job-field label{font-size:12px;color:#888;display:block;margin-bottom:5px;font-weight:500}
.job-field input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;color:#1a1a1a;background:#f9f9f7;transition:border-color 0.12s}
.job-field input:focus{outline:none;border-color:#185FA5;background:#fff}
.job-req{font-size:11px;color:#A32D2D;margin-top:4px;display:none}
.geost{font-size:12px;color:#888;margin-top:10px;display:flex;align-items:center;gap:6px;min-height:18px}
.gdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.gdot.ok{background:#639922}.gdot.err{background:#E24B4A}.gdot.pulse{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loading-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
.loading-screen.hide{display:none}
.spinner{width:32px;height:32px;border:3px solid #e0ddd6;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:14px;color:#888}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:9px 20px;border-radius:8px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
/* Staff login modal */
.login-overlay{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.login-overlay.hide{display:none}
.login-card{background:#fff;border:1px solid #e0ddd6;border-radius:16px;padding:2rem;width:100%;max-width:340px;text-align:center}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:#888;margin-bottom:1.5rem;line-height:1.5}
.pin-big{display:flex;justify-content:center;margin-bottom:1rem}
.pin-big input{width:80px;height:80px;text-align:center;font-size:36px;font-weight:700;border:2px solid #ddd;border-radius:12px;background:#f9f9f7;font-family:inherit;color:#1a1a1a;transition:border-color 0.12s}
.pin-big input:focus{outline:none;border-color:#185FA5;background:#fff}
.login-err{font-size:12px;color:#A32D2D;min-height:16px;margin-bottom:0.75rem}
.login-name{font-size:15px;font-weight:600;color:#3B6D11;min-height:20px;margin-bottom:1rem}
.login-btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;cursor:pointer}
.login-btn:disabled{opacity:0.35;cursor:default}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><p>Connecting…</p></div>
<div class="app">
  <div class="topbar">
    <h1>Work Tracker</h1>
    <a href="https://aarkoh.github.io/Raycontrol/" style="font-size:12px;color:#888;text-decoration:none;padding:5px 10px;border:1px solid #ddd;border-radius:8px;white-space:nowrap">&#8962; Hub</a>
    <span class="conn syncing" id="connBadge">Connecting…</span>
    <span class="liveclock" id="liveClock"></span>
  </div>
  <div class="worker-grid" id="workerGrid"></div>
  <div class="apanel">
    <h2 id="panelTitle">Select your name</h2>
    <p class="sub" id="panelSub">Tap your initials above, then clock in or out</p>
    <div class="job-field" id="jobField" style="display:none">
      <label for="jobInput">Job number</label>
      <input type="text" id="jobInput" placeholder="Enter job number e.g. JOB-001" autocomplete="off" oninput="document.getElementById('jobReq').style.display='none'">
      <div class="job-req" id="jobReq">Job number is required</div>
    </div>
    <div class="brow">
      <button class="btn-in" id="btnIn" disabled onclick="doAction('in')">Clock in</button>
      <button class="btn-out" id="btnOut" disabled onclick="doAction('out')">Clock out</button>
    </div>
    <div class="geost"><span class="gdot" id="geoDot"></span><span id="geoText">Geolocation ready</span></div>
    <div id="debugPanel" style="margin-top:10px;font-size:11px;color:#aaa;font-family:monospace;line-height:1.6"></div>
  </div>
</div>
<!-- Staff Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>&#128100; Staff Login</h2>
    <p>Enter your 1-digit staff code<br>to access this page</p>
    <div class="pin-big"><input type="password" id="staffPin" maxlength="1" inputmode="numeric" oninput="onStaffPinInput()" autocomplete="off"></div>
    <div class="login-name" id="loginName"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn" onclick="doStaffLogin()" disabled>Continue</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, push, update, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBOTxO07JoBnygdNhrZsCCnY33mUlm9oo4",
  authDomain: "attendance-20d6a.firebaseapp.com",
  databaseURL: "https://attendance-20d6a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "attendance-20d6a",
  storageBucket: "attendance-20d6a.firebasestorage.app",
  messagingSenderId: "597668949951",
  appId: "1:597668949951:web:f7fcc8c3b4450f8f80bb0a"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);
const WORKERS = ['HS','TM','RG','MU','AY','IL','SA','AN'];
let sel = null, workers = {};

// ── Geo ──────────────────────────────────────────────────────
function setGeoUI(cls,msg){document.getElementById('geoDot').className='gdot '+cls;document.getElementById('geoText').textContent=msg;}
function isInChina(lat,lon){return lat>=18&&lat<=53&&lon>=73&&lon<=135;}
function revGeoOSM(lat,lon,cb){
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18&addressdetails=1`)
    .then(r=>r.json()).then(d=>{const a=d.address||{};const p=[a.house_number&&a.road?`${a.house_number} ${a.road}`:(a.road||a.pedestrian||a.footway||''),a.suburb||a.neighbourhood||a.quarter||'',a.city||a.town||a.village||a.county||'',a.postcode||'',a.country||''].filter(Boolean);cb(p.length?p.join(', '):`${lat.toFixed(5)}, ${lon.toFixed(5)}`);}).catch(()=>cb(`${lat.toFixed(5)}, ${lon.toFixed(5)}`));
}
function wgs84ToGcj02(lat,lon){const PI=Math.PI,a=6378245.0,ee=0.00669342162296594323;function tLat(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r;}function tLon(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x*PI/30))*2/3;return r;}let dLat=tLat(lon-105,lat-35),dLon=tLon(lon-105,lat-35);const radLat=lat/180*PI;let magic=Math.sin(radLat);magic=1-ee*magic*magic;const sq=Math.sqrt(magic);return[lat+dLat*180/((a*(1-ee))/(magic*sq)*PI),lon+dLon*180/(a/sq*Math.cos(radLat)*PI)];}
function revGeoAmap(lat,lon,cb){const[gLat,gLon]=wgs84ToGcj02(lat,lon);fetch(`https://restapi.amap.com/v3/geocode/regeo?key=4d33a38d9bf129094b75c1a267c82370&location=${gLon.toFixed(6)},${gLat.toFixed(6)}&extensions=base`).then(r=>r.json()).then(d=>{if(d.status==='1'&&d.regeocode)cb(d.regeocode.formatted_address||`${lat.toFixed(5)}, ${lon.toFixed(5)}`);else cb(`${lat.toFixed(5)}, ${lon.toFixed(5)}`);}).catch(()=>cb(`${lat.toFixed(5)}, ${lon.toFixed(5)}`));}
function revGeo(lat,lon,cb){if(isInChina(lat,lon))revGeoAmap(lat,lon,r=>r===`${lat.toFixed(5)}, ${lon.toFixed(5)}`?revGeoOSM(lat,lon,cb):cb(r));else revGeoOSM(lat,lon,cb);}
function getGeo(cb){if(!navigator.geolocation){cb(null,'Not supported');return;}setGeoUI('pulse','Getting precise location…');navigator.geolocation.getCurrentPosition(p=>cb({lat:p.coords.latitude,lon:p.coords.longitude,acc:Math.round(p.coords.accuracy)},null),()=>cb(null,'Location unavailable'),{timeout:15000,maximumAge:0,enableHighAccuracy:true});}

// ── Utils ─────────────────────────────────────────────────────
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function debug(msg){const d=document.getElementById('debugPanel');if(!d)return;const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});d.innerHTML=`[${t}] ${msg}<br>`+d.innerHTML;const lines=d.innerHTML.split('<br>');if(lines.length>5)d.innerHTML=lines.slice(0,5).join('<br>');}
function liveClock(){document.getElementById('liveClock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function resetPanel(){sel=null;renderWorkers();document.getElementById('panelTitle').textContent='Select your name';document.getElementById('panelSub').textContent='Tap your initials above, then clock in or out';document.getElementById('btnIn').disabled=true;document.getElementById('btnOut').disabled=true;document.getElementById('jobField').style.display='none';document.getElementById('jobInput').value='';}

// ── Render ────────────────────────────────────────────────────
function renderWorkers(){
  document.getElementById('workerGrid').innerHTML=WORKERS.map((w,i)=>{
    const wd=workers[w]||{},isSel=sel===w,isIn=wd.status==='in';
    const since=wd.since?new Date(wd.since).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    const job=wd.job?` · ${wd.job}`:'';
    return `<div class="wcard${isSel?' sel':''}${isIn?' ci':''}" onclick="selectW('${w}')"><div class="wav">${w}</div><div class="wnum">${i+1}</div><div class="wstat${isIn?' in':''}">${isIn?'In · '+since+job:'Off'}</div></div>`;
  }).join('');
}
window.selectW=function(w){
  sel=w;const wd=workers[w]||{},isIn=wd.status==='in';
  document.getElementById('panelTitle').textContent=w;
  document.getElementById('panelSub').textContent=isIn?`Clocked in at ${new Date(wd.since).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}. Ready to clock out.`:'Not clocked in. Ready to clock in.';
  document.getElementById('btnIn').disabled=isIn;
  document.getElementById('btnOut').disabled=!isIn;
  // Show job field, pre-fill with current job if clocked in
  document.getElementById('jobField').style.display='block';
  document.getElementById('jobInput').value=wd.job||'';
  document.getElementById('jobReq').style.display='none';
  renderWorkers();
};

// ── Action ────────────────────────────────────────────────────
window.doAction=async function(type){
  if(!sel)return;
  const jobNum=document.getElementById('jobInput').value.trim();
  if(!jobNum){
    document.getElementById('jobReq').style.display='block';
    document.getElementById('jobInput').focus();
    return;
  }
  const w=sel;
  document.getElementById('btnIn').disabled=true;
  document.getElementById('btnOut').disabled=true;
  getGeo(async(geo,err)=>{
    if(err)setGeoUI('err',err);
    const nowUTC = new Date();
    const nowISO = nowUTC.toISOString(); // UTC — used for sorting/calculations
    // Also save device local time so the log displays in worker's local time
    const localTZ = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Singapore';
    const localTimeStr = nowUTC.toLocaleString('en-GB', {
      timeZone: localTZ,
      day:'2-digit', month:'short', year:'numeric',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    });
    const coordStr=geo?`${geo.lat.toFixed(5)}, ${geo.lon.toFixed(5)}`:'';
    await update(ref(db,'workers/'+w),{status:type,since:type==='in'?nowISO:null,sinceLocal:type==='in'?localTimeStr:null,lastTime:nowISO,loc:type==='in'?coordStr:'',job:type==='in'?jobNum:'',tz:localTZ});
    const entry={worker:w,type,time:nowISO,localTime:localTimeStr,tz:localTZ,lat:geo?geo.lat:null,lon:geo?geo.lon:null,acc:geo?geo.acc:null,loc:coordStr,job:jobNum};
    try{
      debug(`Writing ${type} for ${w}…`);
      const newRef=await push(ref(db,'log'),entry);
      debug(`✓ Saved: ${newRef.key}`);
      if(geo){
        setGeoUI('ok',`${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)} (±${geo.acc}m)`);
        revGeo(geo.lat,geo.lon,loc=>{update(newRef,{loc});if(type==='in')update(ref(db,'workers/'+w),{loc});});
      }else setGeoUI('err','No location captured');
      toast(`${w} clocked ${type==='in'?'in':'out'}`);
      setTimeout(resetPanel,2000);
    }catch(e){
      debug(`✗ FAILED: ${e.message}`);
      setGeoUI('err','Write failed: '+e.message);
      toast('Error: '+e.message);
      document.getElementById('btnIn').disabled=type==='in';
      document.getElementById('btnOut').disabled=type!=='in';
    }
  });
};

// ── Auth & Init ───────────────────────────────────────────────
// ── Staff Login ───────────────────────────────────────────────
const WORKERS_LIST=['HS','TM','RG','MU','AY','IL','SA','AN'];
let staffPins={HS:'1',TM:'2',RG:'3',MU:'4',AY:'5',IL:'6',SA:'7',AN:'8'};
let loggedInStaff=null;

function initStaffLogin(){
  const saved=sessionStorage.getItem('rc_staff');
  if(saved&&WORKERS_LIST.includes(saved)){
    loggedInStaff=saved;
    document.getElementById('loginOverlay').classList.add('hide');
    return;
  }
  document.getElementById('loginOverlay').classList.remove('hide');
  setTimeout(()=>document.getElementById('staffPin').focus(),200);
}
window.onStaffPinInput=function(){
  const val=document.getElementById('staffPin').value;
  const matched=WORKERS_LIST.find(w=>staffPins[w]===val);
  document.getElementById('loginErr').textContent='';
  if(matched){document.getElementById('loginName').textContent='👋 Hello, '+matched+'!';document.getElementById('loginBtn').disabled=false;}
  else{document.getElementById('loginName').textContent='';document.getElementById('loginBtn').disabled=true;}
  if(val.length===1&&matched) setTimeout(doStaffLogin,300);
};
window.doStaffLogin=function(){
  const val=document.getElementById('staffPin').value;
  const matched=WORKERS_LIST.find(w=>staffPins[w]===val);
  if(!matched){document.getElementById('loginErr').textContent='Invalid code — try again';document.getElementById('staffPin').value='';document.getElementById('loginName').textContent='';document.getElementById('loginBtn').disabled=true;return;}
  loggedInStaff=matched;
  sessionStorage.setItem('rc_staff',matched);
  document.getElementById('loginOverlay').classList.add('hide');
};

signInAnonymously(auth).catch(e=>{
  document.getElementById('loadingScreen').innerHTML='<p style="color:#A32D2D;padding:2rem;text-align:center">Connection failed. Please refresh.</p>';
});
onAuthStateChanged(auth,async user=>{
  if(!user)return;
  onValue(ref(db,'.info/connected'),snap=>{
    const online=snap.val();
    const b=document.getElementById('connBadge');
    b.textContent=online?'Live':'Offline';
    b.className='conn '+(online?'online':'offline');
  });
  onValue(ref(db,'workers'),snap=>{
    workers=snap.val()||{};
    WORKERS.forEach(w=>{if(!workers[w])workers[w]={status:'out',since:null,loc:'',lastTime:null};});
    renderWorkers();if(sel)window.selectW(sel);
    document.getElementById('loadingScreen').classList.add('hide');
  });
  WORKERS.forEach(async w=>{const s=await get(ref(db,'workers/'+w));if(!s.exists())await set(ref(db,'workers/'+w),{status:'out',since:null,loc:'',lastTime:null});});
  // Load staff pins
  const pinsSnap=await get(ref(db,'config/staffPins'));
  if(pinsSnap.exists()) staffPins={...staffPins,...pinsSnap.val()};
  initStaffLogin();
});
renderWorkers();
setGeoUI('','Geolocation ready');
liveClock();setInterval(liveClock,1000);
setTimeout(()=>document.getElementById('loadingScreen').classList.add('hide'),8000);
</script>
</body>
</html>
