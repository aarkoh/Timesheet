<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:1.25rem 1rem}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;border-bottom:1px solid #e0ddd6;padding-bottom:1rem;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;flex:1;color:#1a1a1a}
.liveclock{font-size:13px;color:#888;font-variant-numeric:tabular-nums}
.conn{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.conn.online{background:#EAF3DE;color:#3B6D11}
.conn.offline{background:#FCEBEB;color:#A32D2D}
.conn.syncing{background:#FAEEDA;color:#854F0B}
.tabs{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#efefed}
.tab{font-family:inherit;font-size:12px;padding:6px 14px;border:none;background:transparent;cursor:pointer;color:#666;transition:background 0.12s}
.tab.active{background:#fff;color:#1a1a1a;font-weight:600}
.panel{display:none}.panel.active{display:block}
.worker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:420px){.worker-grid{grid-template-columns:repeat(2,1fr)}}
.wcard{border:1px solid #ddd;border-radius:12px;padding:1rem 0.5rem;cursor:pointer;background:#fff;text-align:center;transition:border-color 0.12s,background 0.12s;-webkit-tap-highlight-color:transparent;user-select:none}
.wcard:hover{border-color:#aaa;background:#fafafa}
.wcard.sel{border:2px solid #185FA5;background:#E6F1FB}
.wcard.ci{border-color:#3B6D11}
.wcard.sel.ci{border:2px solid #3B6D11;background:#EAF3DE}
.wav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;margin:0 auto 8px;background:#eee;color:#555}
.wcard.sel .wav{background:#B5D4F4;color:#185FA5}
.wcard.ci .wav{background:#C0DD97;color:#3B6D11}
.wcard.sel.ci .wav{background:#C0DD97;color:#3B6D11}
.wnum{font-size:11px;color:#aaa;margin-bottom:2px}
.wstat{font-size:11px;color:#999;margin-top:3px}
.wstat.in{color:#3B6D11;font-weight:500}
.apanel{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.apanel h2{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.apanel .sub{font-size:13px;color:#888;margin-bottom:1rem}
.brow{display:flex;gap:8px;flex-wrap:wrap}
button{font-family:inherit;font-size:13px;padding:9px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.12s,transform 0.1s;-webkit-tap-highlight-color:transparent}
button:hover{background:#f5f5f3}
button:active{transform:scale(0.97)}
button:disabled{opacity:0.35;cursor:default;transform:none}
.btn-in{border-color:#185FA5;color:#185FA5;font-weight:500}.btn-in:hover{background:#E6F1FB}
.btn-out{border-color:#A32D2D;color:#A32D2D;font-weight:500}.btn-out:hover{background:#FCEBEB}
.btn-exp{border-color:#3B6D11;color:#3B6D11;font-weight:500}.btn-exp:hover{background:#EAF3DE}
.geost{font-size:12px;color:#888;margin-top:10px;display:flex;align-items:center;gap:6px;min-height:18px}
.gdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.gdot.ok{background:#639922}.gdot.err{background:#E24B4A}.gdot.pulse{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:1.25rem}
.mcard{border:1px solid #e0ddd6;border-radius:12px;padding:1rem;background:#fff}
.mcard.in{border-left:3px solid #3B6D11}
.mc-name{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.mc-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-bottom:8px;font-weight:500}
.mc-badge.in{background:#EAF3DE;color:#3B6D11}
.mc-badge.out{background:#eee;color:#888}
.mc-detail{font-size:12px;color:#888;line-height:1.7}
.scard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:1.25rem}
.scard{background:#efefed;border-radius:8px;padding:1rem}
.sc-label{font-size:12px;color:#888;margin-bottom:4px}
.sc-val{font-size:22px;font-weight:600;color:#1a1a1a}
.sc-sub{font-size:11px;color:#aaa;margin-top:2px}
.sec-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:0.75rem;margin-top:1.25rem}
.wtable{width:100%;border-collapse:collapse;font-size:13px}
.wtable th{text-align:left;font-weight:600;font-size:12px;color:#888;padding:6px 10px;border-bottom:1px solid #e0ddd6}
.wtable td{padding:8px 10px;border-bottom:1px solid #f0ede6;color:#1a1a1a}
.wtable tr:last-child td{border:none}
.period-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.period-row label{font-size:13px;color:#888}
select{font-family:inherit;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer}
.log-filters{display:flex;gap:6px;margin-bottom:0.75rem;flex-wrap:wrap}
.fbtn{font-size:12px;padding:4px 10px;border-radius:20px}
.fbtn.active{background:#efefed;border-color:#aaa;font-weight:500}
.lempty{font-size:13px;color:#aaa;padding:1.5rem;text-align:center;border:1px solid #e0ddd6;border-radius:8px}
.lentry{border:1px solid #e0ddd6;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:start;background:#fff}
.ltype{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.ltype.in{background:#EAF3DE;color:#3B6D11}
.ltype.out{background:#FCEBEB;color:#A32D2D}
.lworker{font-size:13px;font-weight:600;color:#1a1a1a}
.ltime{font-size:12px;color:#888;margin-top:2px}
.lloc{font-size:11px;color:#aaa;margin-top:2px}
.lts{font-size:12px;color:#aaa;white-space:nowrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:300px;border:1px solid #e0ddd6}
.modal h2{font-size:16px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
.modal p{font-size:13px;color:#888;margin-bottom:1rem}
.pin-input{display:flex;gap:8px;margin-bottom:1rem}
.pin-input input{width:100%;height:52px;text-align:center;font-size:22px;font-weight:600;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.pin-err{font-size:12px;color:#A32D2D;margin-bottom:0.75rem;min-height:16px}
.modal-row{display:flex;gap:8px}
.loading-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
.loading-screen.hide{display:none}
.spinner{width:32px;height:32px;border:3px solid #e0ddd6;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:14px;color:#888}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:9px 20px;border-radius:8px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Connecting to database…</p>
</div>

<div class="app">
  <div class="topbar">
    <h1>Work Tracker</h1>
    <span class="conn syncing" id="connBadge">Connecting…</span>
    <span class="liveclock" id="liveClock"></span>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('clock',this)">Clock in/out</button>
      <button class="tab" onclick="switchTab('manager',this)">Manager</button>
      <button class="tab" onclick="switchTab('summary',this)">Summary</button>
      <button class="tab" onclick="switchTab('log',this)">Log</button>
    </div>
  </div>

  <div class="panel active" id="tab-clock">
    <div class="worker-grid" id="workerGrid"></div>
    <div class="apanel">
      <h2 id="panelTitle">Select your name</h2>
      <p class="sub" id="panelSub">Tap your initials above, then clock in or out</p>
      <div class="brow">
        <button class="btn-in" id="btnIn" disabled onclick="doAction('in')">Clock in</button>
        <button class="btn-out" id="btnOut" disabled onclick="doAction('out')">Clock out</button>
      </div>
      <div class="geost"><span class="gdot" id="geoDot"></span><span id="geoText">Geolocation ready</span></div>
    </div>
  </div>

  <div class="panel" id="tab-manager">
    <div class="scard-grid" id="mStats"></div>
    <div class="sec-title">Current status</div>
    <div class="mgrid" id="managerGrid"></div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #e0ddd6;display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="openPin('change')">Change PIN</button>
      <button onclick="clearAndRebuildLog()" style="border-color:#A32D2D;color:#A32D2D" id="clearLogBtn">Clear duplicate logs</button>
    </div>
  </div>

  <div class="panel" id="tab-summary">
    <div class="period-row">
      <label>Period</label>
      <select id="periodSel" onchange="renderSummary()">
        <option value="today">Today</option>
        <option value="week">This week</option>
        <option value="month">This month</option>
        <option value="all">All time</option>
      </select>
      <button class="btn-exp" onclick="exportCSV()">Export CSV</button>
    </div>
    <div id="summaryContent"></div>
  </div>

  <div class="panel" id="tab-log">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:8px">
      <div class="log-filters">
        <button class="fbtn active" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('in',this)">In</button>
        <button class="fbtn" onclick="setFilter('out',this)">Out</button>
      </div>
      <div style="display:flex;gap:8px">
        <select id="logWFilter" onchange="renderLog()">
          <option value="all">All workers</option>
        </select>
        <button class="btn-exp" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
    <div id="logList"></div>
  </div>
</div>

<div class="modal-bg" id="pinModal">
  <div class="modal">
    <h2 id="pinTitle">Manager PIN</h2>
    <p id="pinSub">Enter 4-digit PIN to continue</p>
    <div class="pin-input">
      <input type="password" maxlength="1" inputmode="numeric" id="p0" oninput="pinInput(0)">
      <input type="password" maxlength="1" inputmode="numeric" id="p1" oninput="pinInput(1)">
      <input type="password" maxlength="1" inputmode="numeric" id="p2" oninput="pinInput(2)">
      <input type="password" maxlength="1" inputmode="numeric" id="p3" oninput="pinInput(3)">
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="modal-row">
      <button onclick="closePinModal()">Cancel</button>
      <button id="pinSubmitBtn" onclick="submitPin()">Unlock</button>
    </div>
    <div id="newPinArea" style="display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid #e0ddd6">
      <p style="font-size:12px;color:#888;margin-bottom:8px">Verify current PIN first, then enter new PIN above</p>
      <button onclick="saveNewPin()">Set new PIN</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, push, update, remove, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBOTxO07JoBnygdNhrZsCCnY33mUlm9oo4",
  authDomain: "attendance-20d6a.firebaseapp.com",
  databaseURL: "https://attendance-20d6a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "attendance-20d6a",
  storageBucket: "attendance-20d6a.firebasestorage.app",
  messagingSenderId: "597668949951",
  appId: "1:597668949951:web:f7fcc8c3b4450f8f80bb0a"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const WORKERS = ['HS','TM','RG','MU','AY','IL','SA','AN'];
let sel = null, logTypeFilter = 'all', pinTarget = null, unlocked = {}, settingNew = false;
let workers = {}, log = [], pin = '1234';

// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const online = snap.val();
  const badge = document.getElementById('connBadge');
  badge.textContent = online ? 'Live' : 'Offline';
  badge.className = 'conn ' + (online ? 'online' : 'offline');
});

// Init
async function initData() {
  for (const w of WORKERS) {
    const snap = await get(ref(db, 'workers/' + w));
    if (!snap.exists()) await set(ref(db, 'workers/' + w), {status:'out', since:null, loc:'', lastTime:null});
  }
  const pinSnap = await get(ref(db, 'config/pin'));
  if (!pinSnap.exists()) await set(ref(db, 'config/pin'), '1234');

  let workersReady = false, logReady = false;
  function checkReady() {
    if (workersReady && logReady) {
      document.getElementById('loadingScreen').classList.add('hide');
      backfillMissingLogEntries();
    }
  }
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hide'), 5000);

  onValue(ref(db, 'workers'), snap => {
    workers = snap.val() || {};
    WORKERS.forEach(w => { if (!workers[w]) workers[w] = {status:'out', since:null, loc:'', lastTime:null}; });
    workersReady = true; checkReady();
    // Backfill log entries for workers clocked in with no log record

    renderWorkers();
    if (sel) selectW(sel);
    if (document.getElementById('tab-manager').classList.contains('active')) renderManager();
    if (document.getElementById('tab-summary').classList.contains('active')) renderSummary();
  });

  onValue(ref(db, 'log'), snap => {
    log = [];
    if (snap.exists()) snap.forEach(child => log.unshift({id: child.key, ...child.val()}));
    log.sort((a, b) => new Date(b.time) - new Date(a.time));
    logReady = true; checkReady();

    renderLog();
    if (document.getElementById('tab-summary').classList.contains('active')) renderSummary();
  });

  onValue(ref(db, 'config/pin'), snap => { if (snap.exists()) pin = snap.val(); });
}

let backfillDone = false;
function backfillMissingLogEntries() {
  if (backfillDone) return;
  backfillDone = true;
  WORKERS.forEach(w => {
    const wd = workers[w] || {};
    if (wd.status !== 'in' || !wd.since) return;
    const hasEntry = log.find(e => e.worker === w && e.type === 'in');
    if (!hasEntry) {
      push(ref(db, 'log'), {
        worker: w, type: 'in', time: wd.since,
        lat: null, lon: null, acc: null, loc: wd.loc || ''
      });
    }
  });
}

function renderWorkers() {
  document.getElementById('workerGrid').innerHTML = WORKERS.map((w, i) => {
    const wd = workers[w] || {};
    const isSel = sel === w, isIn = wd.status === 'in';
    const since = wd.since ? new Date(wd.since).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    return `<div class="wcard${isSel?' sel':''}${isIn?' ci':''}" onclick="_app.selectW('${w}')">
      <div class="wav">${w}</div>
      <div class="wnum">${i+1}</div>
      <div class="wstat${isIn?' in':''}">${isIn ? 'In · '+since : 'Off'}</div>
    </div>`;
  }).join('');
}

function selectW(w) {
  sel = w;
  const wd = workers[w] || {}, isIn = wd.status === 'in';
  document.getElementById('panelTitle').textContent = w;
  document.getElementById('panelSub').textContent = isIn
    ? `Clocked in at ${new Date(wd.since).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}. Ready to clock out.`
    : 'Not clocked in. Ready to clock in.';
  document.getElementById('btnIn').disabled = isIn;
  document.getElementById('btnOut').disabled = !isIn;
  renderWorkers();
}

function getGeo(cb) {
  if (!navigator.geolocation) { cb(null, 'Not supported'); return; }
  setGeoUI('pulse', 'Getting precise location…');
  navigator.geolocation.getCurrentPosition(
    p => cb({lat: p.coords.latitude, lon: p.coords.longitude, acc: Math.round(p.coords.accuracy)}, null),
    () => cb(null, 'Location unavailable'),
    {timeout: 15000, maximumAge: 0, enableHighAccuracy: true}
  );
}
function setGeoUI(cls, msg) {
  document.getElementById('geoDot').className = 'gdot ' + cls;
  document.getElementById('geoText').textContent = msg;
}
function revGeo(lat, lon, cb) {
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18&addressdetails=1`)
    .then(r => r.json()).then(d => {
      const a = d.address || {};
      // Build full street address: unit/house number + road + suburb + city + postcode + country
      const parts = [
        a.house_number && a.road ? `${a.house_number} ${a.road}` : (a.road || a.pedestrian || a.footway || ''),
        a.suburb || a.neighbourhood || a.quarter || '',
        a.city || a.town || a.village || a.county || a.state_district || '',
        a.postcode || '',
        a.country || ''
      ].filter(Boolean);
      cb(parts.length ? parts.join(', ') : `${lat.toFixed(5)}, ${lon.toFixed(5)}`);
    }).catch(() => cb(`${lat.toFixed(5)}, ${lon.toFixed(5)}`));
}

function doAction(type) {
  if (!sel) return;
  const w = sel;
  document.getElementById('btnIn').disabled = true;
  document.getElementById('btnOut').disabled = true;
  getGeo((geo, err) => {
    if (err) setGeoUI('err', err);
    const now = new Date().toISOString();
    update(ref(db, 'workers/' + w), {status: type, since: type==='in' ? now : null, lastTime: now});
    const entry = {worker: w, type, time: now, lat: geo ? geo.lat : null, lon: geo ? geo.lon : null, acc: geo ? geo.acc : null, loc: ''};
    const newRef = push(ref(db, 'log'), entry);
    if (geo) {
      setGeoUI('ok', `${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)} (±${geo.acc}m)`);
      // Immediately save coordinates as placeholder so something shows right away
      const coordStr = `${geo.lat.toFixed(5)}, ${geo.lon.toFixed(5)}`;
      update(newRef, {loc: coordStr});
      if (type === 'in') update(ref(db, 'workers/' + w), {loc: coordStr});
      // Then overwrite with human-readable address once revGeo resolves
      revGeo(geo.lat, geo.lon, loc => {
        update(newRef, {loc});
        if (type === 'in') update(ref(db, 'workers/' + w), {loc});
        else update(ref(db, 'workers/' + w), {loc: ''});
      });
    } else {
      setGeoUI('err', 'No location captured');
    }
    toast(`${w} clocked ${type === 'in' ? 'in' : 'out'}`);
  });
}

function switchTab(tab, el) {
  if ((tab === 'manager' || tab === 'summary') && !unlocked[tab]) { openPin(tab); return; }
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'manager') renderManager();
  if (tab === 'summary') renderSummary();
  if (tab === 'log') renderLog();
}

function renderManager() {
  const inW = WORKERS.filter(w => (workers[w] || {}).status === 'in');
  document.getElementById('mStats').innerHTML = `
    <div class="scard"><div class="sc-label">Clocked in</div><div class="sc-val">${inW.length}</div><div class="sc-sub">of ${WORKERS.length} workers</div></div>
    <div class="scard"><div class="sc-label">Off shift</div><div class="sc-val">${WORKERS.length - inW.length}</div></div>
    <div class="scard"><div class="sc-label">Shifts today</div><div class="sc-val">${todayShifts()}</div><div class="sc-sub">clock-ins</div></div>`;
  document.getElementById('managerGrid').innerHTML = WORKERS.map(w => {
    const wd = workers[w] || {}, isIn = wd.status === 'in';
    const since = wd.since ? new Date(wd.since).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
    return `<div class="mcard${isIn ? ' in' : ''}">
      <div class="mc-name">${w}</div>
      <span class="mc-badge ${wd.status||'out'}">${isIn ? 'Clocked in' : 'Off shift'}</span>
      <div class="mc-detail">${isIn ? `Since: ${since}<br>Location: ${wd.loc||'—'}` : `Last seen: ${lastSeen(w)}`}</div>
    </div>`;
  }).join('');
}
function todayShifts() {
  const s = new Date(); s.setHours(0,0,0,0);
  return log.filter(e => e.type === 'in' && new Date(e.time) >= s).length;
}
function lastSeen(w) {
  const e = log.find(e => e.worker === w);
  return e ? new Date(e.time).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : 'Never';
}

function periodRange(p) {
  const now = new Date();
  if (p === 'today') { const s = new Date(now); s.setHours(0,0,0,0); return {start:s, end:now}; }
  if (p === 'week') { const s = new Date(now); s.setDate(s.getDate()-s.getDay()); s.setHours(0,0,0,0); return {start:s, end:now}; }
  if (p === 'month') return {start: new Date(now.getFullYear(), now.getMonth(), 1), end: now};
  return {start: new Date(0), end: now};
}

function renderSummary() {
  const p = document.getElementById('periodSel').value;
  const {start, end} = periodRange(p);
  const now = new Date();
  const entries = log.filter(e => new Date(e.time) >= start && new Date(e.time) <= end);
  const stats = WORKERS.map(w => {
    const wd = workers[w] || {};
    const isIn = wd.status === 'in';
    // Clock-ins within the period from log
    const ins = entries.filter(e => e.worker === w && e.type === 'in');
    // Ongoing shift before period window (from log)
    const ongoingFromBefore = isIn && wd.since && new Date(wd.since) < start;
    // Worker is clocked in but has NO log entry at all (clocked in via old app / Firebase directly)
    const hasNoLogEntry = isIn && wd.since && !log.find(e => e.worker === w && e.type === 'in');
    const totalShifts = ins.length + (ongoingFromBefore ? 1 : 0) + (hasNoLogEntry ? 1 : 0);
    let mins = 0;
    ins.forEach(ci => {
      const ciTime = new Date(ci.time);
      const co = log.find(o => o.worker === w && o.type === 'out' && new Date(o.time) > ciTime);
      mins += co ? (new Date(co.time) - ciTime) / 60000 : isIn ? (now - ciTime) / 60000 : 0;
    });
    if (ongoingFromBefore) mins += (now - start) / 60000;
    // No log entry at all — use workers[w].since directly
    if (hasNoLogEntry && wd.since) {
      const sinceTime = new Date(wd.since);
      mins += (now - (sinceTime < start ? start : sinceTime)) / 60000;
    }
    // Collect ALL known locations for this worker: from any log entry ever + current workers node
    const allWorkerLocs = log.filter(e => e.worker === w && e.loc).map(e => e.loc);
    if (wd.loc) allWorkerLocs.push(wd.loc);
    const locs = [...new Set(allWorkerLocs)];
    return {w, shifts: totalShifts, hours: (mins / 60).toFixed(1), locs, isIn};
  });
  const ts = stats.reduce((a, s) => a + s.shifts, 0);
  const th = stats.reduce((a, s) => a + parseFloat(s.hours), 0).toFixed(1);
  const currentlyIn = WORKERS.filter(w => (workers[w] || {}).status === 'in').length;
  const activeCount = stats.filter(s => s.shifts > 0 || s.isIn).length;
  document.getElementById('summaryContent').innerHTML = `
    <div class="scard-grid">
      <div class="scard"><div class="sc-label">Total shifts</div><div class="sc-val">${ts}</div></div>
      <div class="scard"><div class="sc-label">Total hours</div><div class="sc-val">${th}h</div></div>
      <div class="scard"><div class="sc-label">Clocked in now</div><div class="sc-val">${currentlyIn}</div><div class="sc-sub">of ${WORKERS.length} workers</div></div>
      <div class="scard"><div class="sc-label">Active this period</div><div class="sc-val">${activeCount}</div></div>
    </div>
    <table class="wtable">
      <thead><tr><th>Worker</th><th>Status</th><th>Shifts</th><th>Hours</th><th>Locations</th></tr></thead>
      <tbody>${stats.map(s => `<tr>
        <td>${s.w}</td>
        <td><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${s.isIn?'#EAF3DE':'#eee'};color:${s.isIn?'#3B6D11':'#888'}">${s.isIn ? 'In' : 'Off'}</span></td>
        <td>${s.shifts}</td>
        <td>${s.hours}h</td>
        <td style="font-size:12px;color:#888">${s.locs.length ? s.locs[0] : (workers[s.w] && workers[s.w].loc ? workers[s.w].loc : '—')}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function setFilter(f, el) {
  logTypeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderLog();
}
function renderLog() {
  const wf = document.getElementById('logWFilter').value;
  const entries = log.filter(e => (logTypeFilter==='all'||e.type===logTypeFilter) && (wf==='all'||e.worker===wf));
  const list = document.getElementById('logList');
  if (!entries.length) { list.innerHTML = '<div class="lempty">No entries found</div>'; return; }
  list.innerHTML = entries.slice(0,100).map(e => {
    const d = new Date(e.time);
    const ds = d.toLocaleDateString([], {day:'2-digit', month:'short', year:'numeric'});
    const ts = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const loc = e.loc || (e.lat!=null ? `${e.lat.toFixed(4)}, ${e.lon.toFixed(4)}` : 'No location');
    return `<div class="lentry">
      <span class="ltype ${e.type}">${e.type==='in'?'IN':'OUT'}</span>
      <div><div class="lworker">${e.worker}</div><div class="ltime">${ds} · ${ts}</div><div class="lloc">${loc}${e.acc?' (±'+e.acc+'m)':''}</div></div>
      <span class="lts">${ts}</span>
    </div>`;
  }).join('');
}

function clearAndRebuildLog() {
  if (!confirm('This will delete ALL log entries and rebuild clean ones from current worker status. Continue?')) return;
  const btn = document.getElementById('clearLogBtn');
  btn.disabled = true; btn.textContent = 'Clearing…';
  // Delete entire log node
  remove(ref(db, 'log')).then(() => {
    // Rebuild one clean entry per worker currently clocked in
    const promises = WORKERS.map(w => {
      const wd = workers[w] || {};
      if (wd.status !== 'in' || !wd.since) return Promise.resolve();
      return push(ref(db, 'log'), {
        worker: w, type: 'in', time: wd.since,
        lat: null, lon: null, acc: null, loc: wd.loc || ''
      });
    });
    return Promise.all(promises);
  }).then(() => {
    backfillDone = true;
    btn.disabled = false; btn.textContent = 'Clear duplicate logs';
    toast('Log cleared and rebuilt');
  }).catch(err => {
    btn.disabled = false; btn.textContent = 'Clear duplicate logs';
    toast('Error: ' + err.message);
  });
}

function exportCSV() {
  const rows = [['Worker','Type','Date','Time','Latitude','Longitude','Accuracy (m)','Location']];
  log.forEach(e => {
    const d = new Date(e.time);
    rows.push([e.worker, e.type, d.toLocaleDateString(), d.toLocaleTimeString(), e.lat||'', e.lon||'', e.acc||'', e.loc||'']);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `worktracker_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); toast('CSV exported');
}

function openPin(target) {
  pinTarget = target; settingNew = false;
  document.getElementById('pinTitle').textContent = target === 'change' ? 'Change PIN' : 'Manager PIN';
  document.getElementById('pinSub').textContent = target === 'change' ? 'Verify current PIN first' : 'Enter 4-digit PIN to continue';
  document.getElementById('newPinArea').style.display = target === 'change' ? 'block' : 'none';
  document.getElementById('pinSubmitBtn').textContent = 'Unlock';
  document.getElementById('pinSubmitBtn').onclick = submitPin;
  clearPin(); document.getElementById('pinErr').textContent = '';
  document.getElementById('pinModal').classList.add('show');
  setTimeout(() => document.getElementById('p0').focus(), 80);
}
function closePinModal() { document.getElementById('pinModal').classList.remove('show'); pinTarget = null; settingNew = false; }
function clearPin() { [0,1,2,3].forEach(i => document.getElementById('p'+i).value = ''); }
function getPin() { return [0,1,2,3].map(i => document.getElementById('p'+i).value).join(''); }
function pinInput(i) {
  if (document.getElementById('p'+i).value && i < 3) setTimeout(() => document.getElementById('p'+(i+1)).focus(), 10);
  if (getPin().length === 4) setTimeout(() => { if (settingNew) saveNewPin(); else submitPin(); }, 100);
}
function submitPin() {
  const p = getPin();
  if (p.length < 4) { document.getElementById('pinErr').textContent = 'Enter all 4 digits'; return; }
  if (p === pin) {
    if (pinTarget === 'change') {
      settingNew = true;
      document.getElementById('pinTitle').textContent = 'Set new PIN';
      document.getElementById('pinSub').textContent = 'Enter your new 4-digit PIN';
      document.getElementById('newPinArea').style.display = 'none';
      document.getElementById('pinSubmitBtn').textContent = 'Save PIN';
      document.getElementById('pinSubmitBtn').onclick = saveNewPin;
      clearPin(); document.getElementById('pinErr').textContent = '';
      document.getElementById('p0').focus(); return;
    }
    unlocked[pinTarget] = true; closePinModal();
    const tabs = ['clock','manager','summary','log'];
    const idx = tabs.indexOf(pinTarget);
    if (idx >= 0) switchTab(pinTarget, document.querySelectorAll('.tab')[idx]);
  } else {
    document.getElementById('pinErr').textContent = 'Incorrect PIN';
    clearPin(); document.getElementById('p0').focus();
  }
}
function saveNewPin() {
  const p = getPin();
  if (p.length < 4) { document.getElementById('pinErr').textContent = 'Enter all 4 digits'; return; }
  set(ref(db, 'config/pin'), p);
  closePinModal(); toast('PIN updated');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function liveClock() {
  document.getElementById('liveClock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// Expose functions called from HTML onclick attributes
window._app = { selectW, switchTab, doAction, setFilter, renderSummary, renderLog, exportCSV, openPin, closePinModal, pinInput, submitPin, saveNewPin };
// Also expose top-level for inline onclicks
window.switchTab = switchTab;
window.doAction = doAction;
window.setFilter = setFilter;
window.renderSummary = renderSummary;
window.renderLog = renderLog;
window.exportCSV = exportCSV;
window.openPin = openPin;
window.closePinModal = closePinModal;
window.pinInput = pinInput;
window.submitPin = submitPin;
window.saveNewPin = saveNewPin;

// Boot
WORKERS.forEach(w => {
  const o = document.createElement('option'); o.value = w; o.textContent = w;
  document.getElementById('logWFilter').appendChild(o);
});
renderWorkers();
setGeoUI('', 'Geolocation ready');
liveClock(); setInterval(liveClock, 1000);
initData();
</script>
</body>
